# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Python app to Azure Web App - seg-drilling-cost-estimator

on:
  push:
    branches:
      - data-ingestion.2.0
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify app entrypoint
        run: |
          if (!(Test-Path .\\app.py)) {
            Write-Error "app.py not found at repo root."
            exit 1
          }

      - name: Zip the application files
        run: |
          $exclude = @(
            '.git',
            '.venv',
            'env',
            '__pycache__',
            '.pytest_cache',
            '.mypy_cache',
            '.gitignore',
            '.devcontainer',
            '.github',
            '*.pyc'
          )
          $args = @('-a', '-c', '-f', 'app.zip')
          foreach ($item in $exclude) { $args += "--exclude=$item" }
          $args += '.'
          tar @args
      
      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'seg-drilling-cost-estimator'
          slot-name: 'dev'
          package: '.\\app.zip'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_1F26B8B52FD0463D9F58499C58583D5D }}