# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Python app to Azure Web App - seg-drilling-cost-estimator

on:
  push:
    branches:
      - data-ingestion.2.0
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify app entrypoint
        run: |
          if (!(Test-Path .\\app.py)) {
            Write-Error "app.py not found at repo root."
            exit 1
          }

      - name: Prepare deployment package
        run: |
          $staging = Join-Path $PWD 'deploy'
          if (Test-Path $staging) {
            Remove-Item $staging -Recurse -Force
          }

          New-Item -ItemType Directory -Path $staging | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $staging 'data') | Out-Null

          Copy-Item .\app.py, .\requirements.txt -Destination $staging
          Copy-Item .\.streamlit -Destination $staging -Recurse
          Copy-Item .\src -Destination $staging -Recurse
          Copy-Item .\data\processed -Destination (Join-Path $staging 'data') -Recurse

          if (Test-Path .\reports) {
            Copy-Item .\reports -Destination $staging -Recurse
          }

          if (Test-Path .\app.zip) {
            Remove-Item .\app.zip -Force
          }

          Compress-Archive -Path "$staging\*" -DestinationPath .\app.zip -Force
          Remove-Item $staging -Recurse -Force
      
      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          slot-name: 'dev'
          package: '.\\app.zip'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}